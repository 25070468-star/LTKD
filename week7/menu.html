<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Navigation Bar</title>

<style>
#header {
    background: url(img/header.jpg);
    height: 200px;
    width: 770px;
    margin: auto;
}

#logo {
    padding: 20px 0 0 50px;
}

#menu_top {
    margin-top: 55px;
    margin-left: 30px;
    background: #ffffff;
    height: 40px;
    opacity: 0.6;
    border-radius: 10px 0 0 10px;
}

.level1 {
    list-style-type: none;
    padding-top: 12px;
}

.level1 li {
    display: inline;
    float: left;
    padding: 0 20px;
    height: 27px;
    font-weight: bold;
}

.level1 li a {
    color: red;
    text-decoration: none;
}

.level1 li a:hover {
    color: green;
}

.level2 {
    display: none;
    position: absolute;
    padding: 0;
    margin-top: 5px;
}

.level1 li:hover .level2 {
    display: block;
}

.level2 li {
    float: none;
    display: block;
    padding: 10px;
    background: #ccc;
}

.level2 li:hover {
    background: #fc0;
}
</style>

</head>

<body>

<header id="header">
    <div id="logo">
        <img src="img/logo.gif" width="150" height="82" alt="Flower Shop">
    </div>

    <nav id="menu_top">
        <ul class="level1">
            <li><a href="#">Home</a></li>
            <li><a href="#">Introduction</a></li>

            <li>
                <a href="#">Flower Category</a>
                <ul class="level2">
                    <li>Sun Flower</li>
                    <li>Rose Flower</li>
                    <li>Lily Flower</li>
                    <li>Tulips Flower</li>
                </ul>
            </li>

            <li><a href="#">Register</a></li>
            <li><a href="#">Login</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
</header>

</body>
</html>
